<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Checker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhai+2:wght@600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <style>
        body {
            background: linear-gradient(135deg, #2193b0, #6dd5ed);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            font-family: "Baloo Bhai 2", sans-serif;
            width: 100%;
            max-width: 460px;
            border-radius: 12px;
        }

        h4 {
            background: linear-gradient(135deg, #2193b0, #6dd5ed);
            color: white;
            font-family: "Baloo Bhai 2", sans-serif;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 1.5rem;
        }

        .pct-big {
            font-size: 60px;
            font-weight: 600;
            text-align: center;
            margin: 0.5rem 0;
        }

        .progress {
            height: 10px;
            border-radius: 99px;
        }

        .btn-primary {
            font-family: "Baloo Bhai 2", sans-serif;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .modal-content {
            font-family: "Baloo Bhai 2", sans-serif;
        }
    </style>
</head>


<body>
    <div class="card shadow-sm p-4">
        <h4 class="shadow-sm p-4">Attendance Checker</h4>

        <div class="mb-3">
            <label for="totalClasses" class="form-label">Total Classes</label>
            <input type="number" class="form-control" id="totalClasses" placeholder="e.g. 120" min="1" />
            <div class="text-danger small mt-1" id="err-total"></div>
        </div>

        <div class="mb-3">
            <label for="attendedClasses" class="form-label">Classes Attended</label>
            <input type="number" class="form-control" id="attendedClasses" placeholder="e.g. 95" min="0" />
            <div class="text-danger small mt-1" id="err-attended"></div>
        </div>

        <button class="btn btn-primary w-100" onclick="checkAttendance()">Check Attendance</button>
    </div>

    <div class="modal fade" id="resultModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-3">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-semibold">Attendance Result</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center pt-2">
                    <div class="pct-big" id="pct-display"></div>
                    <span class="badge fs-6 px-3 py-2 mb-3" id="eligibility-badge"></span>
                    <div class="progress mb-1">
                        <div class="progress-bar" id="progress-fill" role="progressbar"></div>
                    </div>
                    <div class="text-end text-muted small mb-3">75% required</div>
                    <p class="text-muted small mb-0" id="modal-info"></p>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script>
        function checkAttendance() {
            const totalInput = document.getElementById('totalClasses');
            const attendedInput = document.getElementById('attendedClasses');
            const errTotal = document.getElementById('err-total');
            const errAttended = document.getElementById('err-attended');


            errTotal.textContent = '';
            errAttended.textContent = '';

            const total = Number(totalInput.value);
            const attended = Number(attendedInput.value);
            let valid = true;

            if (!totalInput.value.trim() || isNaN(total) || total <= 0) {
                errTotal.textContent = 'Total classes must be a number greater than 0.';
                valid = false;
            }

            if (!attendedInput.value.trim() || isNaN(attended)) {
                errAttended.textContent = 'Please enter the number of classes attended.';
                valid = false;
            } else if (valid) {
                if (attended < 0) {
                    errAttended.textContent = 'Attended classes cannot be negative.';
                    valid = false;
                } else if (attended > total) {
                    errAttended.textContent = 'Attended classes cannot exceed total classes.';
                    valid = false;
                }
            }

            if (!valid) return;

            const percentage = (attended / total) * 100;
            const eligible = percentage >= 75;

            const pctEl = document.getElementById('pct-display');
            pctEl.textContent = percentage.toFixed(2) + '%';
            pctEl.style.color = eligible ? '#3B6D11' : '#A32D2D';


            const badge = document.getElementById('eligibility-badge');
            if (eligible) {
                badge.textContent = 'Eligible for Exam';
                badge.style.background = '#EAF3DE';
                badge.style.color = '#3B6D11';
            } else {
                badge.textContent = 'Not Eligible for Exam';
                badge.style.background = '#FCEBEB';
                badge.style.color = '#A32D2D';
            }

            const fill = document.getElementById('progress-fill');
            fill.style.width = Math.min(percentage, 100).toFixed(2) + '%';
            fill.style.background = eligible ? '#639922' : '#E24B4A';

            const info = document.getElementById('modal-info');
            if (eligible) {
                info.textContent = `You attended ${attended} of ${total} classes — ${(percentage - 75).toFixed(2)}% above the required threshold.`;
            } else {
                const classesNeeded = Math.ceil((0.75 * total - attended) / (1 - 0.75));
                info.textContent = `You are ${(75 - percentage).toFixed(2)}% below the threshold. Attend at least ${classesNeeded} more class${classesNeeded === 1 ? '' : 'es'} to reach 75%.`;
            }

            new bootstrap.Modal(document.getElementById('resultModal')).show();
        }
    </script>
</body>

</html>
